<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Notes</title>
    
    <script src="./html2pdf.bundle.min.js"></script>
    <script src="./html2canvas.min.js"></script>
    
    <style>
        body {
            /* オフライン対応：Webフォントに依存せずOS内蔵の明朝体を使用 */
            font-family: "Sawarabi Mincho", "Hiragino Mincho ProN", "MS Mincho", "Yu Mincho", serif;
            font-size: 16px; 
            line-height: 1.2;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 上部コントロールエリア */
        .controls {
            padding: 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        input[type="button"] {
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #eee;
            border-radius: 4px;
            font-family: inherit;
        }

        input[type="button"]:hover {
            background: #e0e0e0;
        }

        /* メインのレイアウト（左サイドバー、右エディタ） */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左側メモ一覧（サイドバー） */
        .sidebar {
            width: 125px;
            background: #fafafa;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 10px 0;
            box-sizing: border-box;
            transition: margin-left 0.2s ease; /* 開閉時のアニメーション */
        }

        /* 【新機能】サイドバーを閉じているときのスタイル */
        .sidebar.closed {
            margin-left: -126px; /* 横幅+ボーダー分を左に隠す */
        }

        .sidebar-title {
            font-size: 12px;
            color: #666;
            padding: 0 10px 5px 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }

        .note-item {
            padding: 12px 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            word-break: break-all;
        }

        .note-item:hover {
            background: #f0f0f0;
        }

        /* 現在選択中のメモスタイル */
        .note-item.active {
            background: #e0e0e0;
            font-weight: bold;
        }

        /* 右側エディタエリア */
        .editor-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #pagetitle {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            font-family: inherit;
        }

        #textarea {
            outline: none;
            width: 100%;
            flex: 1;
            min-height: 350px;
            padding: 10px 0;
            box-sizing: border-box;
            background-color: #fff;
            border: none;
            font-size: 18px;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        #textarea img {
            max-width: 100%;
            height: auto;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 10px 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="controls">
        <input type="button" value="一覧表示/非表示" onclick="toggleSidebar();" style="background: #ddd; font-weight: bold;"/>
        
        <input type="button" value="新規メモ" onclick="createNewNote();"/>
        <input type="button" value="全データ消去" onclick="localStorageClearAll();"/>
        <input type="button" value="HTML出力" onclick="exportHTML();"/>
        <input type="button" value="PDF出力" onclick="exportPDF();"/>
        <input type="button" value="画像出力(PNG)" onclick="exportImage();"/>
        <input type="button" value="メモ削除" onclick="deleteCurrentNote();"/>
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">メモ一覧</div>
            <div id="noteList"></div>
        </div>

        <div class="editor-container">
            <label style="font-size: 12px; color: #666;">保存ファイル名（メモのタイトル）：</label>
            <input type="text" id="pagetitle" value="MyNote" oninput="updateTitle(this.value)">
            <hr>
            <div id="textarea" contentEditable="true"></div>
        </div>
    </div>

    <script type="text/javascript">
        const sidebar = document.getElementById('sidebar');
        const editor = document.getElementById('textarea');
        const titleInput = document.getElementById('pagetitle');
        const noteListContainer = document.getElementById('noteList');

        let notes = [];         
        let currentNoteId = ""; 

        // ページ読み込み時の処理
        window.addEventListener('load', function(){
            const savedNotes = localStorage.getItem('multi_notes');
            const savedCurrentId = localStorage.getItem('current_note_id');
            
            // 【新機能】前回の開閉状態を復元（デフォルトは開いた状態）
            const sidebarStatus = localStorage.getItem('sidebar_status');
            if (sidebarStatus === 'closed') {
                sidebar.classList.add('closed');
            }

            if (savedNotes) {
                notes = JSON.parse(savedNotes);
            }

            if (notes.length === 0) {
                const defaultId = Date.now().toString();
                notes.push({
                    id: defaultId,
                    title: "MyNote",
                    content: "ここに内容を入力してください。"
                });
                currentNoteId = defaultId;
            } else {
                currentNoteId = savedCurrentId && notes.some(n => n.id === savedCurrentId) ? savedCurrentId : notes[0].id;
            }

            updateSidebarList();
            loadNote(currentNoteId);
        });

        // ページを閉じる前の保存処理
        window.addEventListener('beforeunload', function() {
            saveCurrentData();
        });

        // 【新機能】サイドバーの開閉を切り替える関数
        function toggleSidebar() {
            sidebar.classList.toggle('closed');
            // 状態を記憶
            if (sidebar.classList.contains('closed')) {
                localStorage.setItem('sidebar_status', 'closed');
            } else {
                localStorage.setItem('sidebar_status', 'opened');
            }
        }

        // 現在表示されている内容を配列とlocalStorageに同期する関数
        function saveCurrentData() {
            const currentNote = notes.find(n => n.id === currentNoteId);
            if (currentNote) {
                currentNote.title = titleInput.value;
                currentNote.content = editor.innerHTML;
            }
            localStorage.setItem('multi_notes', JSON.stringify(notes));
            localStorage.setItem('current_note_id', currentNoteId);
        }

        // 指定したIDのメモを画面に読み込む
        function loadNote(id) {
            const note = notes.find(n => n.id === id);
            if (note) {
                currentNoteId = id;
                titleInput.value = note.title;
                editor.innerHTML = note.content;
                
                const items = noteListContainer.querySelectorAll('.note-item');
                items.forEach(item => {
                    if (item.getAttribute('data-id') === id) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        // サイドバーのメモ一覧を更新する
        function updateSidebarList() {
            noteListContainer.innerHTML = "";
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.setAttribute('data-id', note.id);
                div.textContent = note.title || "(無題のメモ)";
                
                div.addEventListener('click', function() {
                    changeNote(note.id);
                });

                if (note.id === currentNoteId) {
                    div.classList.add('active');
                }
                
                noteListContainer.appendChild(div);
            });
        }

        // メモのタイトルがリアルタイムに変更されたとき、サイドバーの文字も連動させる
        function updateTitle(newTitle) {
            const currentNote = notes.find(n => n.id === currentNoteId);
            if (currentNote) {
                currentNote.title = newTitle;
                const item = noteListContainer.querySelector(`.note-item[data-id="${currentNoteId}"]`);
                if (item) item.textContent = newTitle || "(無題のメモ)";
            }
        }

        // メモの切り替え
        function changeNote(id) {
            if (id === currentNoteId) return; 
            saveCurrentData(); 
            loadNote(id);
        }

        // 新規メモの作成
        function createNewNote() {
            saveCurrentData(); 
            
            const newId = Date.now().toString();
            const newNote = {
                id: newId,
                title: "新規メモ",
                content: ""
            };
            notes.push(newNote);
            
            updateSidebarList();
            loadNote(newId);
        }

        // 現在のメモを削除
        function deleteCurrentNote() {
            if (notes.length <= 1) {
                alert("これ以上メモを削除できません（最低1つのメモが必要です）。");
                return;
            }

            if (confirm(`「${titleInput.value}」を削除しますか？`)) {
                notes = notes.filter(n => n.id !== currentNoteId);
                currentNoteId = notes[0].id;
                
                updateSidebarList();
                loadNote(currentNoteId);
                saveCurrentData();
            }
        }

        // 出力関係の関数
        function exportHTML(){
            saveCurrentData();
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { "type" : "text/html" });
            saveFile(URL.createObjectURL(blob), titleInput.value + ".html");
        }

        function exportPDF() {
            saveCurrentData();
            if (typeof html2pdf === 'undefined') {
                alert("html2pdf.bundle.min.js が見つからないため、PDF出力できません。");
                return;
            }
            const opt = {
                margin:       10,
                filename:     titleInput.value + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(editor).save();
        }

        function exportImage() {
            saveCurrentData();
            if (typeof html2canvas === 'undefined') {
                alert("html2canvas.min.js が見つからないため、画像出力できません。");
                return;
            }
            html2canvas(editor, {
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                saveFile(canvas.toDataURL("image/png"), titleInput.value + ".png");
            });
        }

        function saveFile(url, filename) {
            let link = document.createElement('a'); 
            link.href = url;
            link.download = filename;
            link.click();
        }

        // 全データ消去
        function localStorageClearAll(){
            if(confirm("すべてのメモデータを完全に消去しますか？（初期状態に戻ります）")){
                localStorage.removeItem('multi_notes');
                localStorage.removeItem('current_note_id');
                localStorage.removeItem('sidebar_status');
                location.reload(); 
            }
        }

        // 貼り付け時の画像枠調整
        document.addEventListener('paste', function (e) {
            setTimeout(() => {
                const images = editor.querySelectorAll('img');
                images.forEach(img => {
                    if (!img.style.width && !img.getAttribute('width')) {
                        img.style.maxWidth = "100%"; 
                    }
                });
            }, 10);
        });
    </script>
</body>
</html>

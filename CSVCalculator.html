<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CSV電卓</title>
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }
        
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: sans-serif; 
            padding: 20px; 
            box-sizing: border-box; 
            color: #333; 
        }

        .header-content { flex-shrink: 0; }

        h2 { margin-top: 0; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: none; }
        
        .summary-box { 
            background-color: #f0f7ff; 
            border: 2px solid #007bff; 
            padding: 10px 15px; 
            margin: 10px 0; 
            border-radius: 8px;
            display: none;
        }
        .total-amount { font-size: 1.5rem; font-weight: bold; color: #007bff; }

        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            display: none;
        }

        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }

        /* ヘッダーを固定 */
        th { 
            background-color: #f4f4f4; 
            position: sticky; 
            top: 0; 
            z-index: 1; 
        }

        /* 小計列を少し強調 */
        td:first-child { font-weight: bold; color: #333; }

        tr:nth-child(even) { background-color: #fafafa; }
        .error { color: #dc3545; margin-bottom: 10px; font-weight: bold; flex-shrink: 0; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="header-content">
        <h2>CSV電卓</h2>
        <p>形式：金額,個数,項目（金額のみでもOK）</p>
        <textarea id="csvInput" placeholder="500,2,往復交通費&#10;100&#10;300,2,&#10;200,2&#10;100,,大人"></textarea>
        <br>
        <button onclick="processCSV()">計算</button>

        <div id="summaryBox" class="summary-box">
            <span>総合計金額: </span>
            <span id="totalDisplay" class="total-amount">0</span><span> 円</span>
        </div>
    </div>

    <div id="errorMsg" class="error"></div>

    <div id="resultArea" class="table-container"></div>

    <script>
        function processCSV() {
            const input = document.getElementById('csvInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultArea = document.getElementById('resultArea');
            const summaryBox = document.getElementById('summaryBox');
            const totalDisplay = document.getElementById('totalDisplay');
            
            errorMsg.textContent = '';
            resultArea.innerHTML = '';
            resultArea.style.display = 'none';
            summaryBox.style.display = 'none';

            if (!input) {
                errorMsg.textContent = 'CSVデータを見入力してください。';
                return;
            }

            const lines = input.split('\n');
            let totalAll = 0;

            let html = `<table>
                <thead>
                    <tr>
                        <th>小計</th>
                        <th>単価</th>
                        <th>個数</th>
                        <th>項目</th>
                    </tr>
                </thead>
                <tbody>`;

            try {
                lines.forEach((line, index) => {
                    const trimmedLine = line.trim();
                    if (trimmedLine === '') return; 

                    const columns = trimmedLine.split(',');
                    
                    // --- 解析: 金額, 個数, 品名 ---
                    // 1. 金額 (必須)
                    const rawPrice = columns[0] ? columns[0].trim() : "";
                    const price = parseInt(rawPrice);

                    if (isNaN(price)) {
                        throw new Error(`${index + 1}行目の「金額」が正しくありません。`);
                    }

                    // 2. 個数 (デフォルト1)
                    let rawQuantity = columns[1] ? columns[1].trim() : "";
                    let quantity = parseInt(rawQuantity);
                    if (isNaN(quantity)) quantity = 1;

                    // 3. 品名 (デフォルト"-")
                    let name = columns[2] ? columns[2].trim() : "";
                    if (name === "") name = "-";

                    // 計算
                    const subtotal = price * quantity;
                    totalAll += subtotal;

                    // 表示順に合わせてHTML生成: 小計, 単価, 個数, 品目
                    html += `<tr>
                        <td>${subtotal.toLocaleString()}円</td>
                        <td>${price.toLocaleString()}円</td>
                        <td>${quantity.toLocaleString()}</td>
                        <td>${name}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;

                totalDisplay.textContent = totalAll.toLocaleString();
                summaryBox.style.display = 'block';

                resultArea.innerHTML = html;
                resultArea.style.display = 'block';

            } catch (e) {
                errorMsg.textContent = e.message;
                summaryBox.style.display = 'none';
                resultArea.style.display = 'none';
            }
        }
    </script>
</body>
</html>

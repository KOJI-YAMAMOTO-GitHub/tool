<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CSV電卓</title>
    <style>
        /* ページ全体のスクロールを有効にする */
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #fff;
            color: #333; 
            line-height: 1.6;
            margin: 0;
        }

        .header-content { 
            padding: 20px;
            background: #fff;
        }

        h2 { margin-top: 0; }
        textarea { 
            width: 100%; 
            height: 120px; 
            margin-bottom: 10px; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            resize: vertical; 
        }
        
        /* 1. 総合計金額のボックスを最上部に固定 */
        .summary-box { 
            background-color: #f0f7ff; 
            border: 2px solid #007bff; 
            padding: 15px; 
            margin: 0 20px 20px 20px; 
            border-radius: 8px;
            display: none;
            position: sticky;
            top: 10px; /* 画面最上部からの距離 */
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .total-amount { font-size: 1.5rem; font-weight: bold; color: #007bff; }

        .table-container {
            margin: 0 20px 20px 20px;
            display: none;
        }

        table { 
            border-collapse: collapse; 
            width: 100%; 
            background-color: white;
        }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }

        /* 2. 表のタイトル行（th）を固定 */
        /* summary-boxの高さ（約75px）＋余白分を考慮してtopを設定 */
        th { 
            background-color: #f4f4f4; 
            position: sticky; 
            top: 85px; /* summary-boxの下に張り付くように調整 */
            z-index: 90; 
            box-shadow: 0 1px 0 #ddd;
        }

        td:first-child { font-weight: bold; color: #333; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .error { color: #dc3545; margin: 0 20px 10px 20px; font-weight: bold; }
        button { padding: 10px 25px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="header-content">
        <h2>CSV電卓</h2>
        <p>形式：金額,個数,項目（金額のみでもOK）</p>
        <textarea id="csvInput" placeholder="500,2,往復交通費&#10;100&#10;300,2,&#10;200,2&#10;100,,大人"></textarea>
        <br>
        <button onclick="processCSV()">計算実行</button>
    </div>

    <div id="errorMsg" class="error"></div>

    <!-- 固定表示される合計金額エリア -->
    <div id="summaryBox" class="summary-box">
        <span>総合計金額: </span>
        <span id="totalDisplay" class="total-amount">0</span><span> 円</span>
    </div>

    <div id="resultArea" class="table-container"></div>

    <script>
        function processCSV() {
            const input = document.getElementById('csvInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultArea = document.getElementById('resultArea');
            const summaryBox = document.getElementById('summaryBox');
            const totalDisplay = document.getElementById('totalDisplay');
            
            errorMsg.textContent = '';
            resultArea.innerHTML = '';
            resultArea.style.display = 'none';
            summaryBox.style.display = 'none';

            if (!input) {
                errorMsg.textContent = 'CSVデータを入力してください。';
                return;
            }

            const lines = input.split('\n');
            let totalAll = 0;

            let html = `<table>
                <thead>
                    <tr>
                        <th>小計</th>
                        <th>単価</th>
                        <th>個数</th>
                        <th>項目</th>
                    </tr>
                </thead>
                <tbody>`;

            try {
                lines.forEach((line, index) => {
                    const trimmedLine = line.trim();
                    if (trimmedLine === '') return; 

                    const columns = trimmedLine.split(',');
                    
                    const rawPrice = columns[0] ? columns[0].trim() : "";
                    const price = parseInt(rawPrice);

                    if (isNaN(price)) {
                        throw new Error(`${index + 1}行目の「金額」が正しくありません。`);
                    }

                    let rawQuantity = columns[1] ? columns[1].trim() : "";
                    let quantity = parseInt(rawQuantity);
                    if (isNaN(quantity)) quantity = 1;

                    let name = columns[2] ? columns[2].trim() : "";
                    if (name === "") name = "-";

                    const subtotal = price * quantity;
                    totalAll += subtotal;

                    html += `<tr>
                        <td>${subtotal.toLocaleString()}円</td>
                        <td>${price.toLocaleString()}円</td>
                        <td>${quantity.toLocaleString()}</td>
                        <td>${name}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;

                totalDisplay.textContent = totalAll.toLocaleString();
                summaryBox.style.display = 'block';

                resultArea.innerHTML = html;
                resultArea.style.display = 'block';

            } catch (e) {
                errorMsg.textContent = e.message;
                summaryBox.style.display = 'none';
                resultArea.style.display = 'none';
            }
        }
    </script>
</body>
</html>

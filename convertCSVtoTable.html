<!DOCTYPE html>
<html>
<head>
    <title>CSVテーブル</title>
    <style>
        body {
            margin: 20px;
            font-family: sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            /* 横スクロールを出さずに、はみ出た文字は自動で折り返す設定 */
            table-layout: fixed; 
            word-wrap: break-word;
            word-break: break-all;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
            height: 40px;
            cursor: pointer;
            user-select: none;
        }

        /* 並び替えの矢印マーク用スタイル */
        th::after {
            content: " ↕";
            font-size: 0.8em;
            color: #ddd;
        }
        th.sort-asc::after { content: " ▲"; color: #fff; }
        th.sort-desc::after { content: " ▼"; color: #fff; }

        textarea {
            width: 100%;
            height: 200px;
        }

        /* 検索ボックス行のスタイル */
        tr.search-row th {
            background-color: #f9f9f9;
            padding: 5px;
            height: auto;
        }

        tr.search-row input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* テーブル自体の枠組み（スクロール用のコンテナを廃止） */
        .table-outer {
            margin-top: 20px;
            border: 1px solid #ddd;
        }

        /* 【重要】画面全体のスクロールに対して、タイトル行と検索行を上部に固定 */
        tr.sticky-header th {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr.search-row th {
            position: sticky;
            top: 56px; /* タイトル行の高さ（padding込）に合わせて調整 */
            z-index: 9;
        }
    </style>
</head>
<body>
    <h1>CSV変換テーブル</h1>
    <textarea id="csv_data"></textarea>
    <button onclick="createTable()">表示</button>
    <br>
    
    <div class="table-outer">
        <table id="table">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // データのグローバル保持用変数（ソート・フィルター用）
        let originalRows = []; 
        let headerColumns = [];

        function createTable() {
            var csv_data = document.getElementById("csv_data").value;
            var lines = csv_data.split("\n");
            
            var table = document.getElementById("table");
            var thead = table.querySelector("thead");
            var tbody = table.querySelector("tbody");
            
            thead.innerHTML = "";
            tbody.innerHTML = "";
            originalRows = [];

            if (lines.length === 0 || lines[0].trim() === "") return;

            // --- 1. ヘッダー行の生成 ---
            headerColumns = lines[0].split(",");
            var colCount = headerColumns.length; // 基準となる列数

            var header_row = document.createElement("tr");
            header_row.className = "sticky-header";
            
            var search_row = document.createElement("tr");
            search_row.className = "search-row";

            for (var i = 0; i < colCount; i++) {
                // 列名ヘッダー
                var th = document.createElement("th");
                th.textContent = headerColumns[i].trim();
                // クリック時に並び替えを実行
                (function(index) {
                    th.addEventListener('click', function() { sortTable(index, this); });
                })(i);
                header_row.appendChild(th);

                // 検索ボックス用ヘッダー
                var th_search = document.createElement("th");
                var input = document.createElement("input");
                input.type = "text";
                input.placeholder = headerColumns[i].trim() + "を検索";
                input.addEventListener('input', filterTable);
                th_search.appendChild(input);
                search_row.appendChild(th_search);
            }
            thead.appendChild(header_row);
            thead.appendChild(search_row);

            // --- 2. データ行のパースと配列への格納（エラー対策） ---
            for (var i = 1; i < lines.length; i++) {
                if (lines[i].trim() === "") continue;

                var columns = lines[i].split(",");
                
                // 列数が足りない行、または多い行を自動補正（エラー防止）
                while (columns.length < colCount) columns.push("");
                if (columns.length > colCount) columns = columns.slice(0, colCount);

                columns = columns.map(col => col.trim());
                originalRows.push(columns);
            }

            // 最初にテーブルを描画
            renderTable(originalRows);
        }

        // --- 3. 画面描画関数 ---
        function renderTable(dataArray) {
            var tbody = document.getElementById("table").querySelector("tbody");
            tbody.innerHTML = "";

            for (var i = 0; i < dataArray.length; i++) {
                var row = document.createElement("tr");
                for (var j = 0; j < dataArray[i].length; j++) {
                    var td = document.createElement("td");
                    td.textContent = dataArray[i][j];
                    row.appendChild(td);
                }
                tbody.appendChild(row);
            }
        }

        // --- 4. フィルター（各列検索）機能 ---
        function filterTable() {
            var inputs = document.querySelectorAll("tr.search-row input");
            var filters = Array.from(inputs).map(input => input.value.toLowerCase());

            var filteredData = originalRows.filter(function(row) {
                return row.every(function(cellValue, index) {
                    var filterText = filters[index];
                    if (!filterText) return true;
                    return cellValue.toLowerCase().indexOf(filterText) !== -1;
                });
            });

            renderTable(filteredData);
            
            var ths = document.querySelectorAll("tr.sticky-header th");
            ths.forEach(th => th.className = "");
        }

        // --- 5. 並び替え（ソート）機能 ---
        let currentSortCol = -1;
        let isAsc = true;

        function sortTable(colIndex, thElement) {
            if (currentSortCol === colIndex) {
                isAsc = !isAsc;
            } else {
                isAsc = true;
                currentSortCol = colIndex;
            }

            var ths = document.querySelectorAll("tr.sticky-header th");
            ths.forEach(th => th.className = "");
            thElement.className = isAsc ? "sort-asc" : "sort-desc";

            var tbody = document.getElementById("table").querySelector("tbody");
            var currentData = Array.from(tbody.querySelectorAll("tr")).map(tr => {
                return Array.from(tr.querySelectorAll("td")).map(td => td.textContent);
            });

            currentData.sort(function(a, b) {
                var valA = a[colIndex];
                var valB = b[colIndex];

                var numA = Number(valA);
                var numB = Number(valB);
                if (!isNaN(numA) && !isNaN(numB) && valA !== "" && valB !== "") {
                    return isAsc ? numA - numB : numB - numA;
                } else {
                    return isAsc ? valA.localeCompare(valB, 'ja') : valB.localeCompare(valA, 'ja');
                }
            });

            renderTable(currentData);
        }
    </script>
</body>
</html>

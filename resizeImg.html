<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像一括リサイズ・トリミング（オフライン可）</title>
  <style>
    body { font-family: sans-serif; margin: 20px; max-width: 650px; line-height: 1.6; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; background: #fafafa; }
    h3 { margin-top: 0; color: #333; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
    .control { margin-bottom: 10px; display: flex; align-items: center; }
    label { width: 180px; font-weight: bold; }
    input[type="number"], input[type="range"], input[type="text"], select { width: 150px; padding: 5px; box-sizing: border-box; }
    .unit { margin-left: 5px; font-size: 14px; color: #666; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; width: 100%; }
    button:hover { background: #0056b3; }
    #progress { margin-top: 20px; font-weight: bold; color: #28a745; font-size: 18px; text-align: center; }
    .note { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>

  <h1>画像一括リサイズ・トリミング（オフライン可）</h1>
  
  <!-- 1. ファイル入力と保存先 -->
  <div class="section">
    <h3>1. ファイルと保存先の準備</h3>
    <div class="control">
      <label>画像を選択 (複数可):</label>
      <input type="file" id="image-files" accept="image/jpeg, image/png" multiple>
    </div>
    <div class="control">
      <label>保存先フォルダ:</label>
      <button type="button" id="dir-btn" onclick="selectDirectory()" style="width:auto; padding:5px 10px; background:#6c757d;">フォルダを選択する</button>
      <span id="dir-name" style="margin-left:10px; color:#555; font-size:14px;">未選択 (選択必須)</span>
    </div>
    <div class="note">※Chrome、Edge推奨。処理開始時にブラウザ上部に「編集許可」の確認が出たら許可してください。</div>
  </div>

  <!-- 2. ファイル名設定 -->
  <div class="section">
    <h3>2. 出力ファイル名の設定</h3>
    <div class="control">
      <label>ファイル名の形式:</label>
      <select id="filename-type" onchange="toggleFilenameInput()">
        <option value="custom">指定した名前 + 連番</option>
        <option value="original">元のファイル名 + 接頭辞</option>
      </select>
    </div>
    <div class="control" id="custom-name-group">
      <label>指定ファイル名:</label>
      <input type="text" id="custom-filename" value="image" placeholder="例: travel">
      <span class="unit">（後ろに -001, -002... が付きます）</span>
    </div>
    <div class="control" id="prefix-name-group" style="display: none;">
      <label>追加する文字(接頭辞):</label>
      <input type="text" id="prefix-filename" value="resized_" placeholder="例: min_">
      <span class="unit">（元の名前の頭に付きます）</span>
    </div>
  </div>

  <!-- 3. トリミング設定 -->
  <div class="section">
    <h3>3. トリミング（切り抜き）設定</h3>
    <p style="font-size:13px; margin:0 0 10px 0; color:#e63946;">元の画像サイズから、指定したピクセル分だけ内側に削ります。</p>
    <div class="control">
      <label>上側を削る量:</label>
      <input type="number" id="crop-top" value="650" min="0"><span class="unit">px</span>
    </div>
    <div class="control">
      <label>下側を削る量:</label>
      <input type="number" id="crop-bottom" value="650" min="0"><span class="unit">px</span>
    </div>
    <div class="control">
      <label>左側を削る量:</label>
      <input type="number" id="crop-left" value="210" min="0"><span class="unit">px</span>
    </div>
    <div class="control">
      <label>右側を削る量:</label>
      <input type="number" id="crop-right" value="210" min="0"><span class="unit">px</span>
    </div>
  </div>

  <!-- 4. サイズ・圧縮設定 -->
  <div class="section">
    <h3>4. リサイズ・圧縮設定</h3>
    <div class="control">
      <label>トリミング後の横幅:</label>
      <input type="number" id="target-width" value="1200"><span class="unit">px (※仕上がりの横幅)</span>
    </div>
    <div class="control">
      <label>画質 (圧縮率):</label>
      <input type="range" id="image-quality" min="0.1" max="1.0" step="0.05" value="0.8">
      <span id="quality-val" style="margin-left:10px;">0.8</span>
    </div>
  </div>

  <button onclick="processImages()">一括処理スタート</button>

  <div id="progress"></div>

  <script>
    let directoryHandle = null;

    // 画質スライダーの数値連動
    document.getElementById('image-quality').addEventListener('input', (e) => {
      document.getElementById('quality-val').textContent = e.target.value;
    });

    // ファイル名設定の表示切り替え
    function toggleFilenameInput() {
      const type = document.getElementById('filename-type').value;
      if (type === 'custom') {
        document.getElementById('custom-name-group').style.display = 'flex';
        document.getElementById('prefix-name-group').style.display = 'none';
      } else {
        document.getElementById('custom-name-group').style.display = 'none';
        document.getElementById('prefix-name-group').style.display = 'flex';
      }
    }

    // 保存先フォルダを選択する関数 (Chrome/Edge専用)
    async function selectDirectory() {
      try {
        directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        document.getElementById('dir-name').textContent = `選択済み: 📁 ${directoryHandle.name}`;
        document.getElementById('dir-name').style.color = "green";
      } catch (error) {
        console.error(error);
        alert('フォルダの選択がキャンセルされたか、お使いのブラウザが対応していません。');
      }
    }

    // メインの処理関数
    async function processImages() {
      const fileInput = document.getElementById('image-files');
      const files = fileInput.files;
      const progressDiv = document.getElementById('progress');

      if (files.length === 0) {
        alert('画像ファイルを選択してください。');
        return;
      }
      if (!directoryHandle) {
        alert('先に「保存先フォルダ」を選択してください。');
        return;
      }

      // 各種設定値の取得
      const filenameType = document.getElementById('filename-type').value;
      const customFilename = document.getElementById('custom-filename').value.trim();
      const prefixFilename = document.getElementById('prefix-filename').value.trim();
      
      const cropTop = parseInt(document.getElementById('crop-top').value) || 0;
      const cropBottom = parseInt(document.getElementById('crop-bottom').value) || 0;
      const cropLeft = parseInt(document.getElementById('crop-left').value) || 0;
      const cropRight = parseInt(document.getElementById('crop-right').value) || 0;
      const targetWidth = parseInt(document.getElementById('target-width').value);
      const quality = parseFloat(document.getElementById('image-quality').value);

      progressDiv.textContent = `処理を開始します... (0 / ${files.length})`;

      for (let i = 0; i < files.length; i++) {
        progressDiv.textContent = `処理中: ${i + 1} / ${files.length} 枚目`;
        
        // ファイル名の生成
        let newFileName = "";
        if (filenameType === 'custom') {
          const serialNumber = String(i + 1).padStart(3, '0');
          const baseName = customFilename || "image";
          newFileName = `${baseName}-${serialNumber}.jpg`;
        } else {
          const origName = files[i].name.substring(0, files[i].name.lastIndexOf('.')) || files[i].name;
          newFileName = `${prefixFilename}${origName}.jpg`;
        }
        
        try {
          await resizeCropAndSave(files[i], directoryHandle, newFileName, { cropTop, cropBottom, cropLeft, cropRight, targetWidth, quality });
        } catch (error) {
          console.error('エラー発生:', files[i].name, error);
          alert(`${files[i].name} の処理中にエラーが発生しました。ブラウザの書き込み許可を与えているか確認してください。`);
          break;
        }

        await new Promise(resolve => setTimeout(resolve, 50));
      }

      progressDiv.textContent = `🎉 すべて完了！ ${files.length} 枚の画像を保存しました。`;
    }

    // 1枚の画像を処理して保存する関数
    function resizeCropAndSave(file, dirHandle, newFileName, config) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function(event) {
          const img = new Image();
          img.onload = async function() {
            try {
              const sourceX = config.cropLeft;
              const sourceY = config.cropTop;
              const sourceWidth = img.width - config.cropLeft - config.cropRight;
              const sourceHeight = img.height - config.cropTop - config.cropBottom;

              if (sourceWidth <= 0 || sourceHeight <= 0) {
                reject(new Error('トリミング量が画像のサイズを超えています。'));
                return;
              }

              const ratio = sourceHeight / sourceWidth;
              const targetHeight = Math.floor(config.targetWidth * ratio);

              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              canvas.width = config.targetWidth;
              canvas.height = targetHeight;

              ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, config.targetWidth, targetHeight);

              canvas.toBlob(async function(blob) {
                try {
                  const fileHandle = await dirHandle.getFileHandle(newFileName, { create: true });
                  const writable = await fileHandle.createWritable();
                  await writable.write(blob);
                  await writable.close();
                  resolve();
                } catch (e) {
                  reject(e);
                }
              }, 'image/jpeg', config.quality);

            } catch (err) {
              reject(err);
            }
          };
          img.onerror = reject;
          img.src = event.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>

</body>
</html>
